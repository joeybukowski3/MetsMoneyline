name: Daily Data Update

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install bot dependencies
        run: npm install
        working-directory: ./bot

      - name: Generate Mets data
        working-directory: ./bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          API_SPORTS_BASE_URL: ${{ secrets.API_SPORTS_BASE_URL }}
          API_SPORTS_MLB_LEAGUE_ID: ${{ secrets.API_SPORTS_MLB_LEAGUE_ID }}
          API_SPORTS_METS_TEAM_ID: ${{ secrets.API_SPORTS_METS_TEAM_ID }}
        run: node generator.js

      - name: Build advanced-stats JSON
        working-directory: ./bot
        env:
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          API_SPORTS_BASE_URL: ${{ secrets.API_SPORTS_BASE_URL }}
          API_SPORTS_MLB_LEAGUE_ID: ${{ secrets.API_SPORTS_MLB_LEAGUE_ID }}
          API_SPORTS_METS_TEAM_ID: ${{ secrets.API_SPORTS_METS_TEAM_ID }}
        run: node build-advanced-stats-json.js

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/sample-game.json public/data/pick-history.json public/api/mlb/mets/standings.json public/api/mlb/mets/overview.json
          git add public/api/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily data update [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
