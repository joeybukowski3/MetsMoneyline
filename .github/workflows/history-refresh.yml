name: Postgame History Refresh

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

# Queue runs that write pick-history.json — don't let two instances race
concurrency:
  group: pick-history-write
  cancel-in-progress: false

jobs:
  refresh-history:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install bot dependencies
        working-directory: ./bot
        run: npm install

      - name: Sync to latest main before generating
        run: |
          git fetch origin main
          git reset --hard origin/main
          echo "[history] Generating on top of $(git rev-parse --short HEAD) ($(git log -1 --format='%s' HEAD))"

      - name: Refresh pick history
        working-directory: ./bot
        run: node refresh-pick-history.js

      - name: Commit and push updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          ENTRIES_BEFORE=$(node -e "try{const d=require('./public/data/pick-history.json');console.log(d.entries?.length??0)}catch{console.log(0)}" 2>/dev/null || echo 0)
          echo "[history] Entries before commit: ${ENTRIES_BEFORE}"

          git add public/data/pick-history.json
          if git diff --staged --quiet; then
            echo "[history] No history changes to commit — already up to date"
            exit 0
          fi

          git commit -m "chore: refresh pick history [skip ci]"
          echo "[history] Committed. Current HEAD: $(git rev-parse --short HEAD)"

          # Push with one safe retry — if rejected, reset to latest main, regenerate, and push
          if ! git push --force-with-lease origin main; then
            echo "[history] Push rejected — fetching latest main and regenerating..."
            git fetch origin main
            git reset --soft HEAD~1
            git reset --hard origin/main
            echo "[history] Retrying on top of $(git rev-parse --short HEAD)"
            node bot/refresh-pick-history.js

            git add public/data/pick-history.json
            if git diff --staged --quiet; then
              echo "[history] No changes after retry — already up to date"
              exit 0
            fi
            git commit -m "chore: refresh pick history [skip ci]"
            git push origin main
          fi

          ENTRIES_AFTER=$(node -e "try{const d=require('./public/data/pick-history.json');console.log(d.entries?.length??0)}catch{console.log(0)}" 2>/dev/null || echo 0)
          echo "[history] Done. Entries after commit: ${ENTRIES_AFTER}"
