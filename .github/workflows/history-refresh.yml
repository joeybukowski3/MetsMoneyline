name: Postgame History Refresh

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-history:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Refresh pick history
        working-directory: ./bot
        run: node refresh-pick-history.js

      - name: Commit and push updated history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/pick-history.json
          git diff --staged --quiet && echo "No history changes to commit" && exit 0
          git commit -m "chore: refresh pick history [skip ci]"
          git pull --rebase origin main
          git push origin main
