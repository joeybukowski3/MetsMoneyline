name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "5 8 * * *"   # 3:05 AM ET — overnight reset, advance to next matchup
    - cron: "5 13 * * *"  # 1:05 PM ET — game day analysis
    - cron: "5 14 * * *"  # 2:05 PM ET — backup run
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bot/package-lock.json

      - name: Install bot dependencies
        working-directory: ./bot
        run: npm ci

      - name: Generate fresh game data
        working-directory: ./bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: node generator.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
