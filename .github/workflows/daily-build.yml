name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bot/package-lock.json

      - name: Install bot dependencies
        working-directory: ./bot
        run: npm ci

      - name: Build internal API cache
        working-directory: ./bot
        env:
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          API_SPORTS_BASE_URL: ${{ secrets.API_SPORTS_BASE_URL }}
          API_SPORTS_MLB_LEAGUE_ID: ${{ secrets.API_SPORTS_MLB_LEAGUE_ID }}
          API_SPORTS_METS_TEAM_ID: ${{ secrets.API_SPORTS_METS_TEAM_ID }}
        run: node build-api-cache.js

      - name: Generate fresh game data
        working-directory: ./bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          API_SPORTS_BASE_URL: ${{ secrets.API_SPORTS_BASE_URL }}
          API_SPORTS_MLB_LEAGUE_ID: ${{ secrets.API_SPORTS_MLB_LEAGUE_ID }}
          API_SPORTS_METS_TEAM_ID: ${{ secrets.API_SPORTS_METS_TEAM_ID }}
        run: node generator.js

      - name: Refresh pick history
        working-directory: ./bot
        run: node refresh-pick-history.js

      - name: Build advanced-stats JSON
        working-directory: ./bot
        env:
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          API_SPORTS_BASE_URL: ${{ secrets.API_SPORTS_BASE_URL }}
          API_SPORTS_MLB_LEAGUE_ID: ${{ secrets.API_SPORTS_MLB_LEAGUE_ID }}
          API_SPORTS_METS_TEAM_ID: ${{ secrets.API_SPORTS_METS_TEAM_ID }}
        run: node build-advanced-stats-json.js

      - name: Verify published data against live sources
        id: verify
        working-directory: ./bot
        run: node verify-data.js

      - name: Regenerate once if verification drift is detected
        if: failure() && steps.verify.outcome == 'failure'
        working-directory: ./bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          API_SPORTS_KEY: ${{ secrets.API_SPORTS_KEY }}
          API_SPORTS_BASE_URL: ${{ secrets.API_SPORTS_BASE_URL }}
          API_SPORTS_MLB_LEAGUE_ID: ${{ secrets.API_SPORTS_MLB_LEAGUE_ID }}
          API_SPORTS_METS_TEAM_ID: ${{ secrets.API_SPORTS_METS_TEAM_ID }}
        run: node generator.js

      - name: Re-verify after regeneration
        if: failure() && steps.verify.outcome == 'failure'
        working-directory: ./bot
        run: node verify-data.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
